<!DOCTYPE html><html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Birthday Wishes</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#ff9a9e,#fad0c4);font-family:Arial;color:white;text-align:center;overflow:hidden}
.card{padding:30px;border-radius:20px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px)}
.cake{font-size:100px;animation:bounce 1.5s infinite}
.candle{animation:flicker .5s infinite alternate}
@keyframes bounce{50%{transform:translateY(-15px)}}
@keyframes flicker{from{opacity:1}to{opacity:.5}}
</style>
</head>
<body>
<div class='card'>
<div class='candle'>🕯️🕯️🕯️</div>
<div class='cake'>🎂</div>
<h1>Happy Birthday Dhruv 🎉</h1>
<p>May your day be filled with happiness, love & endless smiles ✨</p>
</div>
</body>
</html>
